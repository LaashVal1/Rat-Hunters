<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Karma Project - Rats Hunter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Monaco', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Navigation */
        .nav {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .nav a:hover {
            background: #ff4444;
            transform: translateY(-2px);
        }

        .nav a.active {
            background: #ff4444;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #ff4444;
        }

        h1 {
            font-size: 3em;
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2em;
            color: #aaa;
            font-style: italic;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 150px;
            border: 1px solid #444;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ff4444;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff4444;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Forms */
        .form-section {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #333;
        }

        .form-section h2 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ff4444;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 1em;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff4444;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 1px solid #333;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav">
            <a href="index.html" class="active">🏠 Home</a>
            <a href="wanted.html">🐀 Most Wanted</a>
            <a href="crew.html">👥 Crew</a>
            <a href="admin.html">🔧 Admin</a>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>🐀 THE KARMA PROJECT 🎯</h1>
            <div class="tagline">"Report Rats. Join the Hunt. Bring Justice."</div>
        </div>

        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-card" onclick="location.href='wanted.html'">
                <div class="stat-number" id="ratsCount">0</div>
                <div class="stat-label">🐀 Rats Reported</div>
            </div>
            <div class="stat-card" onclick="location.href='crew.html'">
                <div class="stat-number" id="huntersCount">0</div>
                <div class="stat-label">👥 Crew Members</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="wantedCount">0</div>
                <div class="stat-label">⚠️ Most Wanted</div>
            </div>
        </div>

        <!-- Main Forms Grid -->
        <div class="main-grid">
            <!-- Submit Rat Form -->
            <div class="form-section">
                <h2>🐀 Report a Rat</h2>
                <form onsubmit="event.preventDefault(); submitRat();">
                    <div class="form-group">
                        <label>Rat's Name / Alias:</label>
                        <input type="text" id="ratName" required>
                    </div>
                    <div class="form-group">
                        <label>Evidence / Description:</label>
                        <textarea id="ratEvidence" required></textarea>
                    </div>
                    <button type="submit">🔍 Submit Rat Report</button>
                </form>
            </div>

            <!-- Join Crew Form -->
            <div class="form-section">
                <h2>👤 Join the Crew</h2>
                <form onsubmit="event.preventDefault(); joinCrew();">
                    <div class="form-group">
                        <label>Your Name / Handle:</label>
                        <input type="text" id="hunterName" required>
                    </div>
                    <div class="form-group">
                        <label>Your Role:</label>
                        <select id="hunterRole">
                            <option value="Tracker">Tracker</option>
                            <option value="Sniper">Sniper</option>
                            <option value="Scout">Scout</option>
                            <option value="Intel">Intel</option>
                            <option value="Bounty Hunter">Bounty Hunter</option>
                        </select>
                    </div>
                    <button type="submit">⚔️ Join the Hunt</button>
                </form>
            </div>
        </div>

        <!-- Recent Reports Preview -->
        <div class="form-section">
            <h2>📋 Recent Reports</h2>
            <div id="recentReports">Loading...</div>
        </div>

        <div class="footer">
            <p>⚡ The Karma Project - Justice in the SpacePort ⚡</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Load initial data
        document.addEventListener('DOMContentLoaded', () => {
            loadRecentReports();
            updateAllStats();
        });
    </script>
</body>
</html>
