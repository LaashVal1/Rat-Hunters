<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - The Karma Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .nav a:hover, .nav a.active {
            background: #ff9900;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #ff9900;
        }

        h1 {
            font-size: 3em;
            color: #ff9900;
        }

        .admin-login {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        .admin-login input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a2e;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
        }

        .admin-panel {
            display: none;
        }

        .section {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .section h2 {
            margin-bottom: 20px;
            color: #ff9900;
        }

        .item-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .item {
            background: #1a1a2e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-info {
            flex: 1;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }

        .delete-btn:hover {
            background: #cc0000;
        }

        .status-select {
            padding: 5px;
            margin-left: 10px;
            background: #1a1a2e;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
        }

        button {
            background: #ff9900;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 1px solid #333;
            margin-top: 30px;
        }

        .error {
            color: #ff4444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="index.html">🏠 Home</a>
            <a href="wanted.html">🐀 Most Wanted</a>
            <a href="crew.html">👥 Crew</a>
            <a href="admin.html" class="active">🔧 Admin</a>
        </div>

        <!-- Admin Login -->
        <div id="adminLogin" class="admin-login">
            <h2>🔐 Admin Access</h2>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <button onclick="checkAdminLogin()">Login</button>
            <div id="loginError" class="error"></div>
        </div>

        <!-- Admin Panel (Hidden until login) -->
        <div id="adminPanel" class="admin-panel">
            <div class="header">
                <h1>🔧 ADMIN PANEL 🔧</h1>
                <p>Manage rats, hunters, and system settings</p>
            </div>

            <!-- Manage Rats Section -->
            <div class="section">
                <h2>🐀 Manage Rat Reports</h2>
                <div id="adminRatsList" class="item-list">
                    Loading...
                </div>
            </div>

            <!-- Manage Hunters Section -->
            <div class="section">
                <h2>👥 Manage Crew Members</h2>
                <div id="adminHuntersList" class="item-list">
                    Loading...
                </div>
            </div>
        </div>

        <div class="footer">
            <p>🔒 Admin actions are logged and permanent</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
